<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not-fight-club</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Header -->
    <div class="top-section page">
      <p class="main-txt">Main</p>
      <div class="icons">
        <img
          class="icon-home icon"
          src="./assets/icons8-главная-100.png"
          alt="home icon"
        />
        <img
          class="icon-profile icon"
          src="./assets/icons8-profile-50.png"
          alt="profile icon"
        />
        <img
          class="icon-setting icon"
          src="./assets/icons8-настройки-100.png"
          alt="setting icon"
        />
      </div>
    </div>
    <!-- Create Character -->
    <div class="create-character page">
      <h1 class="create-character-title">Create Your Character</h1>
      <h3 class="create-character-subtitle">Enter character name</h3>
      <input type="text" id="name" name="name" autocomplete="name" />
      <button class="btn-create-character">Create Character</button>
    </div>

    <!-- Home -->
    <div class="home page">
      <button class="btn-fight">Fight!</button>
    </div>

    <!-- Setting -->
    <div class="setting page">
      <p class="text-setting">Player Name:</p>
      <input
        class="edit-name-input"
        type="text"
        name="edit-name"
        id="edit-name"
      />
      <button class="btn-edit">Edit</button>
    </div>

    <!-- Profile -->
    <div class="profile page">
      <div class="current-character">
        <div class="overlay"></div>
        <img
          class="main-character"
          src="./assets/main-character/эльф.jpg"
          alt="character-elf"
        />
        <span class="button-change-character"></span>
      </div>
      <div class="text-content-profile">
        <p class="text-profile">Your name:</p>
        <p class="count-wins">Wins: <span class="wins-value">0</span></p>
        <p class="count-loses">Losses: <span class="loses-value">0</span></p>
        <div class="change-character">
          <div class="small-character">
            <span class="choose-character"></span>
            <div class="overlay-small"></div>
            <img
              class="extra-character"
              src="/assets/main-character/печенька.jpg"
              alt="character-cookie"
            />
          </div>
          <div class="small-character">
            <span class="choose-character"></span>
            <div class="overlay-small"></div>
            <img
              class="extra-character"
              src="./assets/main-character/санта.jpg"
              alt="character-santa"
            />
          </div>
          <div class="small-character">
            <span class="choose-character"></span>
            <div class="overlay-small"></div>
            <img
              class="extra-character"
              src="./assets/main-character/снеговик.jpg"
              alt="character-snowman"
            />
          </div>
        </div>
      </div>
    </div>
    <div class="overlay-big"></div>
    <!-- Fight -->
    <div class="fight page">
      <div class="content-fight">
        <!-- Left part -->
        <div class="left-part">
          <p class="name-fight"></p>
          <div id="my-character-container"></div>
          <div class="alive">
            <div class="inner-alive"></div>
          </div>
          <p class="current-alive">
            <span class="my-current-alive">150</span>/150
          </p>
        </div>
        <!-- Center part -->
        <div class="center-part">
          <p class="choose-zones-txt">
            Please pick 1 Attack zone and 2 Defense zones
          </p>
          <div class="choose-zones">
            <div class="zones">
              <div class="attack-zones">
                <p class="attack-zones-text">Attack Zones</p>
                <label>
                  Head
                  <input type="checkbox" name="remember" value="yes" />
                </label>
                <label>
                  Neck
                  <input type="checkbox" name="remember" value="yes" />
                </label>
                <label>
                  Body
                  <input type="checkbox" name="remember" value="yes" />
                </label>
                <label>
                  Belly
                  <input type="checkbox" name="remember" value="yes" />
                </label>
                <label>
                  Legs <input type="checkbox" name="remember" value="yes" />
                </label>
              </div>
              <div class="defence-zones">
                <p class="defence-zones-text">Defence Zones</p>
                <label
                  ><input type="checkbox" name="remember" value="yes" />
                  Head</label
                >
                <label
                  ><input type="checkbox" name="remember" value="yes" />
                  Neck</label
                >
                <label
                  ><input type="checkbox" name="remember" value="yes" />
                  Body</label
                >
                <label
                  ><input type="checkbox" name="remember" value="yes" />
                  Belly</label
                >
                <label
                  ><input type="checkbox" name="remember" value="yes" />
                  Legs</label
                >
              </div>
            </div>
          </div>
          <button class="btn-throw">Throw</button>
        </div>
        <!-- Right part -->
        <div class="right-par">
          <p class="name-opponent"></p>
          <div id="opponent-container"></div>
          <div class="alive">
            <div class="inner-alive"></div>
          </div>
          <p class="current-alive">
            <span class="opponent-current-alive">100</span>/<span
              class="all-alive-opponent"
              >100</span
            >
          </p>
        </div>
      </div>
    </div>
    <!-- Tnd end:) -->
    <script defer src="./main.js"></script>
  </body>
</html>
